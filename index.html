<html>
	<head>
		<title>Birthday party!</title>
		<link rel="shortcut icon" href="imgs/favicon.png" type="image/x-icon">
		<style>
			@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@100;400;500;600;700;800;900&display=swap');
			@import url('https://fonts.googleapis.com/css2?family=Monoton&family=Montserrat:wght@100;200;300;400;500;600;700;800;900&display=swap');
			* {
				margin: 0;
				padding: 0;
				font-family: 'Montserrat', sans-serif;
				color: #ffffff;
			}
			a {
				text-decoration: none;
			}
			body {
				background-color: #222222;
				background-image: url("imgs/bgbg.png");
				width: 100vw;
				height: 100vh;
			}
			.container {
				width: 1200px;
				margin-left: auto;
				margin-right: auto;
				position: absolute;
				top: 50vh;
				left: 50vw;
				transform: translate(-50%, -50%);
			}
			.header-image {
				width: 800px;
			}
			.line {
				margin-top: 50px;
				width: 1200px;
			}
			.info {
				margin-top: 50px;
				display: grid;
				grid-template-columns: auto 1fr 200px;
				grid-template-areas: "t _ b";
				grid-gap: 50px;
			}
			.info-items {
				display: grid;
				grid-template-columns: auto auto auto;
				grid-gap: 50px;
			}
			.info-text {
				background-color: #222222;
				padding: 30px;
				box-shadow: 0px 20px 50px 0px rgba(0, 0, 0, 0.5);
			}
			.info-text > p {
				font-size: 16px;
			}
			.info-text > h1 {
				font-size: 20px;
			}
			.info-button {
				grid-area: b;
				display: flex;
				justify-content: center;
				align-items: center;
				width: 200px;
  				height: 94px;
				font-weight: 800;
				background-color: #222222;
				border-image: linear-gradient(45deg, #FFA69F, #FE7EFD, #9CA1FE) 30;
				border-width: 2px;
				border-style: solid;
				box-shadow: 0px 20px 50px 0px rgba(0, 0, 0, 0.5);
				transition: all 0.3s ease;
			}
			.info-button:hover {
				background: linear-gradient(45deg, #FFA69F, #FE7EFD, #9CA1FE);
				transition: all 0.3s ease;
			}
			.footer {
				width: 200px;
				position: absolute;
				bottom: 50px;
				left: calc(50vw - 100px);
				text-align: center;
			}
			@media screen and (max-width: 1300px) {
				.container {
					width: 900px;
				}
				.header-image {
					width: 600px;
				}
				.line {
					width: 900px;
				}
				.info-text {
					padding: 20px;
				}
			}
			@media screen and (max-width: 1000px) {
				.container {
					width: 600px;
				}
				.header-image {
					width: 500px;
				}
				.line {
					width: 600px;
				}
				.info {
					display: block;
				}
				.info-items {
					display: grid;
					grid-template-columns: auto auto auto;
					grid-gap: 30px;
				}
				.info-text > p {
				font-size: 14px;
				}
				.info-text > h1 {
					font-size: 16px;
				}
				.info-button {
					margin-left: auto;
					margin-top: 50px;
				}
			}
		</style>
	</head>
	<body>
		<div class="container">
			<div class="header">
				<img src="imgs/header.png" class="header-image">
			</div>
			<img src="imgs/line.png" alt="" class="line">
			<div class="info">
				<div class="info-items">
					<div class="info-text">
						<p>место:</p>
						<h1>Кореновская 2к3</h1>
					</div>
					<div class="info-text">
						<p>время:</p>
						<h1>18:00</h1>
					</div>
					<div class="info-text">
						<p>стиль:</p>
						<h1>удобный</h1>
					</div>
				</div>
				<a href="" class="info-button">Подробнее</a>
			</div>
		</div>
		<div class="footer">
			<img src="imgs/itshuel.png" class="itshuel">
			</div>
		</div>
	</body>
</html>
